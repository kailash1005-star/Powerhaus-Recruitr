# Cloud Build config for the Powerhaus Recruitr backend.
#
# The image is now lightweight (Docling/torch removed — parsing is pure-Python),
# so a plain `docker build` finishes in a couple of minutes. We pull the previous
# image and build with an inline layer cache so repeat builds reuse unchanged
# layers. No Kaniko (it OOM'd on the old torch image) and no buildx needed.
#
# The trigger is already pointed at this file. The deploy step sets ONLY --image,
# so existing env vars / config on the Cloud Run service are preserved.
#
# NOTE on `$$`: Cloud Build resolves $NAME / ${NAME} as substitutions. SHELL
# variables (like the IMAGE var below) must be written as $$IMAGE so a literal $
# reaches bash. Built-in ($PROJECT_ID, $SHORT_SHA) and user (${_REGION}, ${_REPO},
# ${_SERVICE}) substitutions use a single $.

substitutions:
  _REGION: europe-west1
  _REPO: cloud-run-source-deploy      # Artifact Registry repo your images live in
  _SERVICE: powerhaus-recruitr

steps:
  # ── Pull the previous image as a cache source (first build has none) ───────
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}"
        docker pull "$$IMAGE:latest" || true

  # ── Build with an inline layer cache ───────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}"
        DOCKER_BUILDKIT=1 docker build \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --cache-from "$$IMAGE:latest" \
          -t "$$IMAGE:$SHORT_SHA" \
          -t "$$IMAGE:latest" \
          -f BE/Dockerfile BE

  # ── Push both tags ─────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}"
        docker push "$$IMAGE:$SHORT_SHA"
        docker push "$$IMAGE:latest"

  # ── Deploy (only --image changes; service env/config is preserved) ─────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}"
        gcloud run deploy ${_SERVICE} \
          --image="$$IMAGE:$SHORT_SHA" \
          --region=${_REGION} \
          --platform=managed \
          --quiet

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
