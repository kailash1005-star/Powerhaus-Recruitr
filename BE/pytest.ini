[pytest]
# Only files named test_*.py are tests. The tests/ directory also holds live-DB
# diagnostic scripts (check_jobs.py, list_dbs.py, seed_*.py) that must never run
# as part of a test pass.
python_files = test_*.py
testpaths = tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
